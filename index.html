<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seminar Proposal</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Arvo&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arvo', serif;
      background: #fff;
    }

    .page_404 {
      padding: 40px 0;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 0 15px;
      margin: 0 auto;
    }

    .four_zero_four_bg {
      background-image: url("https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif");
      height: 400px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain;
    }

    .four_zero_four_bg h1 {
      font-size: 80px;
      color: #000;
    }

    .contant_box_404 {
      margin-top: -50px;
    }

    .contant_box_404 h3 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .contant_box_404 p {
      font-size: 16px;
      margin-bottom: 20px;
      color: #555;
    }

    .link_404 {
      color: #fff !important;
      padding: 10px 20px;
      background: #39ac31;
      margin: 20px 0;
      display: inline-block;
      text-decoration: none;
      border-radius: 4px;
      transition: 0.3s;
      cursor: default;
    }

    .link_404:hover {
      background: #39ac31;
    }

    @media (max-width: 768px) {
      .four_zero_four_bg {
        height: 300px;
      }

      .four_zero_four_bg h1 {
        font-size: 60px;
      }

      .contant_box_404 h3 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <section class="page_404">
    <div class="container">
      <div class="four_zero_four_bg">
        <h1>404</h1>
      </div>

      <div class="contant_box_404">
        <h3>Seminar Proposal</h3>
        <p>Penelitian Disertasi Doktor</p>
        <a href="javascript:void(0)" class="link_404">Masa Perbaikan</a>
      </div>
    </div>
  </section>

</body>
</html>
